<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>💀 5090D 终极拷问 · 全核榨干器</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff5555;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 8px;
            border-left: 6px solid #ff0000;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
        }
        #stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #00ffaa;
            background: rgba(0,0,0,0.6);
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 28px;
            font-weight: bold;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid #00ffaa;
        }
        #cpu-badge {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ffaa00;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            z-index: 100;
        }
        #warning {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffaa00;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            text-align: right;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>⚠️ 双路极限负载 · 5090D 刑场</h1>
        <p>GPU: 200万粒子 + 体积光追 | CPU: 8 Worker 死循环</p>
    </div>
    <div id="warning">
        ⚡ 全核满载中<br>
        🔥 预计温度快速上升
    </div>
    <div id="stats">FPS: --</div>
    <div id="cpu-badge">💻 CPU Workers: 8 (100%)</div>

    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://91277813.github.io/78.js"
            }
        }
    </script>

    <script type="module">
        // ======================== GPU 终极压榨模块 ========================
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- 初始化场景 (强制最高消耗) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.002); // 雾效增加 overdraw
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 15, 35);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            powerPreference: "high-performance",
            stencil: false,
            depth: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.max(window.devicePixelRatio, 2)); // 强制高分
        renderer.shadowMap.enabled = true; // 开启阴影进一步消耗
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 自动旋转镜头增加渲染压力
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.enablePan = true;

        // --- 复杂光照系统 ---
        // 主光源产生阴影
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(10, 30, 20);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        const d = 40;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 60;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);
        
        // 多组点光源创造复杂光照
        const colors = [0xff4444, 0x44ff44, 0x4444ff, 0xffaa00, 0xff44ff];
        for (let i = 0; i < 10; i++) {
            const light = new THREE.PointLight(colors[i % colors.length], 0.8 + Math.random()*0.5, 50);
            light.position.set(
                (Math.random() - 0.5) * 40,
                5 + Math.random() * 20,
                (Math.random() - 0.5) * 40
            );
            light.castShadow = true;
            light.shadow.mapSize.width = 512;
            light.shadow.mapSize.height = 512;
            scene.add(light);
        }
        
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);

        // --- 核心1：200万实例化粒子 (高精度球体) ---
        const particleCount = 2000000;
        const geometry = new THREE.SphereGeometry(0.15, 6, 6); // 每个粒子有较多面
        
        // 使用标准材质以获得完整光照计算 (更耗)
        const material = new THREE.MeshStandardMaterial({
            color: 0x88aaff,
            roughness: 0.3,
            metalness: 0.1,
            emissive: new THREE.Color(0x112233),
            flatShading: false
        });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, particleCount);
        instancedMesh.castShadow = true;
        instancedMesh.receiveShadow = true;
        
        // 存储每个粒子的速度向量 (用于动画)
        const velocities = [];
        const dummy = new THREE.Object3D();
        
        for (let i = 0; i < particleCount; i++) {
            // 分布在半径 30 的球壳/球体内
            const r = 15 + Math.random() * 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta) * 0.6; // 稍扁
            const z = r * Math.cos(phi);
            
            dummy.position.set(x, y, z);
            dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            dummy.scale.setScalar(0.6 + Math.random() * 1.0);
            dummy.updateMatrix();
            instancedMesh.setMatrixAt(i, dummy.matrix);
            
            // 随机速度方向
            velocities.push({
                x: (Math.random() - 0.5) * 0.02,
                y: (Math.random() - 0.5) * 0.02,
                z: (Math.random() - 0.5) * 0.02
            });
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        scene.add(instancedMesh);

        // 添加一些大的障碍物增加阴影计算量
        const rockGeo = new THREE.IcosahedronGeometry(2.5, 2);
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x886644, roughness: 0.8, metalness: 0.1 });
        for (let i = 0; i < 15; i++) {
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(
                (Math.random() - 0.5) * 35,
                (Math.random() - 0.5) * 15 + 5,
                (Math.random() - 0.5) * 35
            );
            rock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }

        // 地面 (接收阴影)
        const groundGeo = new THREE.CircleGeometry(50, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a2b3c, roughness: 0.9, metalness: 0.0, side: THREE.DoubleSide });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -5;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- 核心2：全屏后处理体积光着色器 (片段杀手) ---
        // 我们不使用后期Pass以降低复杂度，而是直接在场景中添加一个全屏Quad叠加体积光效果？
        // 为了最大化GPU负载，采用第二个场景叠加渲染？Three.js一个场景已足够，我们可以使用ShaderPass但会引入额外库。
        // 替代方案：强制开启物理光照并增加粒子数量已经足够，我们还可以修改renderer的输出编码，但不加后期了。
        // 然而片段着色器杀手可以通过自定义材质实现，但这里粒子是标准材质。
        // 我们可以在渲染循环中强制渲染两次？或者用一个简单的全屏Quad叠加光晕？为了代码简洁且有效，我已经将粒子数设为200万，加上阴影和10个点光源，足以让5090D降到20帧以下。
        
        // 为了让GPU更加绝望，我们再添加一个体积光平面，带自定义着色器，始终面向相机，叠加雾效。
        // 创建一个全屏的Sprite或Plane，使用自定义着色器进行体积光计算。
        const volMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                precision highp float;
                varying vec2 vUv;
                uniform float time;
                
                // 模拟体积光步进 (每条光线64步)
                float noise(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898,78.233))) * 43758.5453);
                }
                
                float fbm(vec2 p) {
                    float sum = 0.0;
                    float amp = 0.5;
                    float freq = 4.0;
                    for(int i = 0; i < 8; i++) {
                        sum += amp * noise(p * freq);
                        amp *= 0.5;
                        freq *= 2.0;
                    }
                    return sum;
                }
                
                void main() {
                    vec2 uv = vUv;
                    vec3 col = vec3(0.0);
                    
                    // 体积光步进 - 模拟穿过介质的散射
                    float depth = 0.0;
                    vec2 stepVec = vec2(0.0, 0.0);
                    
                    for(int i = 0; i < 64; i++) {
                        float fi = float(i);
                        vec2 offset = vec2(
                            sin(uv.x * 10.0 + time * 0.5 + fi * 0.1),
                            cos(uv.y * 8.0 - time * 0.3 + fi * 0.15)
                        ) * 0.05;
                        
                        vec2 p = uv + offset + stepVec;
                        float n = fbm(p * 3.0 + time * 0.1);
                        depth += n * 0.02;
                        stepVec += offset * 0.1;
                    }
                    
                    // 颜色基于深度和位置
                    col.r = sin(uv.x * 20.0 + time) * 0.5 + 0.5;
                    col.g = cos(uv.y * 25.0 - time * 0.7) * 0.5 + 0.5;
                    col.b = sin((uv.x + uv.y) * 15.0 + time * 1.2) * 0.5 + 0.5;
                    
                    col += vec3(depth * 0.8, depth * 0.3, depth);
                    
                    // 添加高光
                    col += pow(max(0.0, 1.0 - length(uv - 0.5) * 1.5), 3.0) * 0.3;
                    
                    gl_FragColor = vec4(col * 0.15, 0.15); // 低透明度叠加，增加混合开销
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        
        const volPlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), volMaterial);
        volPlane.frustumCulled = false;
        // 作为第二场景叠加？简单起见，直接作为普通Mesh始终面向相机并放在相机前？
        // 更简单：我们创建一个后处理场景，但为了省代码，放弃这个plane，因为200万粒子加阴影已经够呛。
        // 但是为了确保达到10帧，我们保留这个体积平面，并让它始终覆盖屏幕。
        // 需要在动画循环里更新其位置到相机前。
        scene.add(volPlane);
        
        // --- FPS 计数器 ---
        let frameCount = 0;
        let lastTime = performance.now();
        const fpsElement = document.getElementById('stats');
        
        // --- 粒子动画更新 (CPU侧也参与一部分) ---
        function updateParticles() {
            // 每帧更新实例矩阵，这对CPU也是负担
            for (let i = 0; i < particleCount; i++) {
                // 为了性能，这里只更新一部分？不，我们就是要全量更新，让CPU也忙起来
                // 但是200万次循环在JS里可能导致主线程卡死，所以改为每帧只更新一部分？
                // 目标是把GPU压到10帧，如果主线程先卡死变成1帧就不符合要求了。
                // 所以采用折中：更新所有粒子的位置，但使用TypedArray操作更快？
                // 我们直接调用instancedMesh.setMatrixAt，它内部会操作数组。
                instancedMesh.getMatrixAt(i, dummy.matrix);
                dummy.position.x += velocities[i].x;
                dummy.position.y += velocities[i].y;
                dummy.position.z += velocities[i].z;
                
                // 边界反弹
                const limit = 28;
                if (Math.abs(dummy.position.x) > limit) velocities[i].x *= -0.98;
                if (Math.abs(dummy.position.y) > limit) velocities[i].y *= -0.98;
                if (Math.abs(dummy.position.z) > limit) velocities[i].z *= -0.98;
                
                dummy.position.x = Math.max(-limit, Math.min(limit, dummy.position.x));
                dummy.position.y = Math.max(-limit, Math.min(limit, dummy.position.y));
                dummy.position.z = Math.max(-limit, Math.min(limit, dummy.position.z));
                
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
        }

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新粒子 (这是CPU重活)
            updateParticles();
            
            // 更新体积平面位置 (始终在相机前)
            if (volPlane) {
                volPlane.position.copy(camera.position);
                volPlane.quaternion.copy(camera.quaternion);
                volPlane.translateZ(-5); // 放在相机前5单位
                volMaterial.uniforms.time.value += 0.016;
            }
            
            controls.update();
            renderer.render(scene, camera);
            
            // FPS计算
            frameCount++;
            const now = performance.now();
            const delta = now - lastTime;
            if (delta >= 1000) {
                const fps = Math.round((frameCount * 1000) / delta);
                fpsElement.textContent = `FPS: ${fps}`;
                frameCount = 0;
                lastTime = now;
            }
        }
        
        animate();

        // --- 窗口自适应 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.max(window.devicePixelRatio, 2));
        }
        
        // 启动后立刻开始自动旋转
        controls.autoRotate = true;
    </script>

    <!-- ======================== CPU 终极压榨模块 (Web Workers) ======================== -->
    <script>
        (function initCPUWorkers() {
            // 创建8个Worker (一般旗舰CPU为8P核或更多，但8个足够吃满)
            const workerCount = 8;
            const workers = [];
            
            // Worker 内执行的死循环计算代码 (素数查找 + Mandelbrot)
            function createWorkerCode() {
                return `
                    // 持续进行高负荷浮点运算
                    function isPrime(n) {
                        if (n < 2) return false;
                        for (let i = 2, s = Math.sqrt(n); i <= s; i++) {
                            if (n % i === 0) return false;
                        }
                        return true;
                    }
                    
                    function mandelbrot(cr, ci, maxIter) {
                        let zr = 0, zi = 0, n = 0;
                        while (zr*zr + zi*zi <= 4.0 && n < maxIter) {
                            const tmp = zr*zr - zi*zi + cr;
                            zi = 2.0*zr*zi + ci;
                            zr = tmp;
                            n++;
                        }
                        return n;
                    }
                    
                    let count = 0;
                    let primeNum = 1000000;
                    
                    // 死循环计算
                    function heavyTask() {
                        // 找素数
                        for (let i = 0; i < 5000; i++) {
                            isPrime(primeNum + i);
                        }
                        primeNum += 5000;
                        
                        // 计算Mandelbrot集某区域
                        for (let j = 0; j < 100; j++) {
                            const cr = -0.8 + (count % 100) * 0.01;
                            const ci = 0.2 + (j * 0.01);
                            mandelbrot(cr, ci, 200);
                        }
                        
                        count++;
                        // 不设延迟，直接下一轮
                        setTimeout(heavyTask, 0); // 使用setTimeout避免阻塞消息，但仍然是连续执行
                    }
                    
                    heavyTask();
                `;
            }
            
            for (let i = 0; i < workerCount; i++) {
                const blob = new Blob([createWorkerCode()], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                workers.push(worker);
                worker.onerror = (e) => console.error('Worker error:', e);
            }
            
            // 主线程也参与一部分压力 (避免主线程空闲)
            function mainThreadHeavyTask() {
                let sum = 0;
                for (let i = 0; i < 500000; i++) {
                    sum += Math.sin(i) * Math.cos(i * 0.01);
                }
                // 操作DOM制造重排
                const el = document.getElementById('cpu-badge');
                if (el) {
                    el.style.opacity = (Math.sin(Date.now() * 0.01) * 0.3 + 0.7).toString();
                }
                setTimeout(mainThreadHeavyTask, 0);
            }
            mainThreadHeavyTask();
            
            console.log('%c💀 8个CPU Worker已启动，全核满载中...', 'color: red; font-size: 16px;');
        })();
    </script>
    
    <!-- 额外小彩蛋：页面关闭前提示 -->
    <script>
        window.addEventListener('beforeunload', (e) => {
            // 不做实际拦截，仅提醒
        });
    </script>
</body>
</html>
