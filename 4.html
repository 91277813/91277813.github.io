<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>三角洲行动 · 微信登录</title>
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(circle at 20% 30%, #1a2a1f, #0b0f0a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* 军事风格装饰网格/斜线 */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(60, 100, 60, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(60, 100, 60, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* 动态准星装饰 (仅氛围) */
    body::after {
      content: "";
      position: absolute;
      top: 10%;
      right: 5%;
      width: 180px;
      height: 180px;
      background: url('data:image/svg+xml;utf8,<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg"><circle cx="90" cy="90" r="70" fill="none" stroke="%234a6b3f" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.25"/><circle cx="90" cy="90" r="40" fill="none" stroke="%236a9a5b" stroke-width="1" opacity="0.2"/><line x1="20" y1="90" x2="160" y2="90" stroke="%234a6b3f" stroke-width="0.8" opacity="0.2"/><line x1="90" y1="20" x2="90" y2="160" stroke="%234a6b3f" stroke-width="0.8" opacity="0.2"/></svg>');
      background-size: contain;
      background-repeat: no-repeat;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      background: rgba(12, 18, 12, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(110, 150, 90, 0.25);
      border-radius: 36px;
      padding: 32px 24px 40px;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(70, 120, 50, 0.2) inset;
      transition: transform 0.2s ease;
    }

    /* 顶部行动标识 */
    .delta-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .delta-icon {
      background: #1e3318;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #6b8c5c;
      box-shadow: 0 4px 0 #0f190c;
      transform: rotate(0deg);
    }

    .delta-icon svg {
      width: 32px;
      height: 32px;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
    }

    .badge-text {
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: 6px;
      color: #d4e8ca;
      text-shadow: 0 4px 8px #00000040, 0 0 8px #4a7a3a;
      font-style: italic;
    }

    .game-title {
      text-align: center;
      margin-bottom: 12px;
    }

    .game-title h1 {
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      color: #e2f0d6;
      letter-spacing: 6px;
      text-shadow: 0 2px 0 #1a3a10, 0 5px 15px #00000080;
      word-break: keep-all;
    }

    .game-title .sub {
      color: #a4c09a;
      font-weight: 500;
      letter-spacing: 3px;
      font-size: 0.9rem;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .sub i {
      font-size: 6px;
      color: #7fa06e;
    }

    /* 分割线装饰 */
    .divider {
      display: flex;
      align-items: center;
      margin: 28px 0 20px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #5f8252, #8fb37e, #5f8252, transparent);
    }

    .divider-text {
      padding: 0 12px;
      color: #9bb88e;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
    }

    /* 微信登录按钮 — 核心交互 */
    .wechat-login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: #07C160;
      background: linear-gradient(145deg, #1db858, #07a850);
      border: none;
      border-bottom: 4px solid #056b30;
      border-radius: 60px;
      padding: 16px 18px;
      color: white;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 2px;
      box-shadow: 0 10px 20px -5px rgba(7, 193, 96, 0.3), 0 4px 0 #0a3d1e inset, 0 2px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }

    .wechat-login-btn i {
      font-size: 1.8rem;
      filter: drop-shadow(0 2px 2px #00000040);
    }

    .wechat-login-btn span {
      text-shadow: 0 1px 3px #00000060;
    }

    .wechat-login-btn:hover {
      background: #1fcb6b;
      background: linear-gradient(145deg, #26c868, #0fb354);
      transform: translateY(-2px);
      box-shadow: 0 14px 24px -6px rgba(7, 193, 96, 0.5), 0 4px 0 #0a3d1e inset;
    }

    .wechat-login-btn:active {
      transform: translateY(2px);
      box-shadow: 0 6px 12px -4px rgba(7, 193, 96, 0.4), 0 2px 0 #0a3d1e inset;
      border-bottom-width: 2px;
    }

    /* 加载状态 */
    .wechat-login-btn.loading {
      pointer-events: none;
      opacity: 0.9;
    }

    .wechat-login-btn.loading i {
      animation: fa-spin 1s infinite linear;
    }

    /* 协议与提示 */
    .legal {
      text-align: center;
      color: #8aa37e;
      font-size: 0.7rem;
      margin-top: 16px;
      opacity: 0.9;
    }

    .legal a {
      color: #bcddab;
      text-decoration: none;
      font-weight: 500;
    }

    .feature-tag {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 8px 0 4px;
    }

    .feature-tag span {
      color: #bedbb1;
      font-size: 0.75rem;
      background: rgba(30, 50, 20, 0.5);
      padding: 4px 12px;
      border-radius: 30px;
      border: 0.5px solid #6b8c5c;
      backdrop-filter: blur(4px);
    }

    /* 行动代号水印 */
    .operation-watermark {
      margin-top: 28px;
      display: flex;
      justify-content: center;
    }

    .watermark-text {
      font-family: monospace;
      color: #517a42;
      font-size: 0.7rem;
      letter-spacing: 4px;
      border-top: 1px dashed #3f5e33;
      padding-top: 16px;
      width: fit-content;
      opacity: 0.7;
    }

    /* 跳转提示 (轻量) */
    .toast-message {
      text-align: center;
      margin-top: 8px;
      min-height: 20px;
    }

    #loginHint {
      color: #b3d9a2;
      font-size: 0.8rem;
      transition: opacity 0.2s;
    }

    /* 针对移动端优化 */
    @media (max-width: 420px) {
      .login-card {
        padding: 24px 20px 32px;
      }
      .game-title h1 {
        font-size: 1.9rem;
        letter-spacing: 4px;
      }
      .wechat-login-btn {
        padding: 14px 16px;
        font-size: 1.2rem;
      }
    }

    /* 自定义动画 */
    @keyframes fa-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="login-card">
  
  <!-- 三角洲标志 -->
  <div class="delta-badge">
    <div class="delta-icon">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L85 80 L15 80 L50 10Z" fill="#2d4a1e" stroke="#7da064" stroke-width="3" stroke-linejoin="round"/>
        <path d="M50 30 L68 70 L32 70 L50 30Z" fill="#3f6b2b" stroke="#aacf94" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="50" cy="55" r="6" fill="#c0e0ae" />
      </svg>
    </div>
    <span class="badge-text">Δ</span>
  </div>

  <!-- 主标题 -->
  <div class="game-title">
    <h1>三角洲行动</h1>
    <div class="sub">
      <span>DELTA FORCE</span>
      <i class="fas fa-crosshairs"></i>
      <span>HAWK OPS</span>
    </div>
  </div>

  <!-- 特色标签 -->
  <div class="feature-tag">
    <span>战术射击</span>
    <span>危险行动</span>
    <span>全面战场</span>
  </div>

  <!-- 分割装饰 -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text"><i class="fas fa-shield-hal"></i> 微信授权登录 <i class="fas fa-shield-hal"></i></div>
    <div class="divider-line"></div>
  </div>

  <!-- 微信登录按钮 (核心) -->
  <button class="wechat-login-btn" id="wechatLoginBtn">
    <i class="fab fa-weixin"></i>
    <span>微信登录</span>
  </button>

  <!-- 动态提示区 -->
  <div class="toast-message">
    <span id="loginHint">点击即代表同意《用户协议》</span>
  </div>

  <!-- 协议与隐私链接（示意） -->
  <div class="legal">
    <a href="#" onclick="return false;">用户协议</a>  ·  <a href="#" onclick="return false;">隐私政策</a>  ·  <a href="#" onclick="return false;">适龄提示</a>
  </div>

  <!-- 行动水印 -->
  <div class="operation-watermark">
    <div class="watermark-text">OPERATION: SHADOW STRIKE</div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    const loginBtn = document.getElementById('wechatLoginBtn');
    const hintEl = document.getElementById('loginHint');
    
    // 目标跳转页面 (三角洲大厅 HTML)
    const TARGET_PAGE = 'delta.html';   // 与登录页同目录下的三角洲主页面

    // 微信登录点击处理
    function handleWechatLogin(e) {
      e.preventDefault();
      
      // 防止重复点击
      if (loginBtn.classList.contains('loading')) return;
      
      // 添加loading状态
      loginBtn.classList.add('loading');
      const originalContent = loginBtn.innerHTML;
      loginBtn.innerHTML = `<i class="fab fa-weixin"></i><span>授权登录中...</span>`;
      
      // 更新提示文字
      if (hintEl) {
        hintEl.style.opacity = '0.8';
        hintEl.textContent = '正在唤起微信授权 ...';
      }

      // 模拟微信授权过程 (约0.8秒后跳转，更真实)
      setTimeout(() => {
        // 再次改变提示
        if (hintEl) {
          hintEl.textContent = '授权成功，即将进入行动 ...';
        }
        loginBtn.innerHTML = `<i class="fas fa-check-circle"></i><span>登录成功</span>`;
        
        // 短暂延迟后执行跳转 (让用户看到成功反馈)
        setTimeout(() => {
          // 跳转到三角洲主页面 (delta.html)
          window.location.href = TARGET_PAGE;
        }, 400);
        
      }, 800);
    }

    // 绑定事件
    loginBtn.addEventListener('click', handleWechatLogin);
    
    // 触摸/移动端优化：防止双击缩放干扰（不影响主功能）
    loginBtn.addEventListener('touchstart', function(){}, { passive: true });
    
    // 如果因为某些原因按钮内包含链接行为，阻止默认
    // 已经通过preventDefault处理

    // 附加: 点击协议不跳转 (已经使用onclick return false)
    
    // 可选: 键盘/无障碍支持
    loginBtn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        loginBtn.click();
      }
    });
    
  })();
</script>

<!-- 确保在微信内嵌浏览器或其他浏览器均表现一致 -->
</body>
</html>
