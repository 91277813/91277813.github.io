<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>打开抖音 · 精彩视频</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      color: #fff;
      /* 模拟视频网站深色氛围 */
      background-image: radial-gradient(circle at 20% 30%, #1a1f2a 0%, #030405 100%);
    }

    .player-card {
      max-width: 400px;
      width: 100%;
      background: rgba(18, 22, 28, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 28px 22px 32px;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.2s ease;
      text-align: center;
    }

    /* 视频封面风格区域 */
    .video-thumb {
      background: #0e1219;
      border-radius: 24px;
      padding: 20px 12px 18px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .video-thumb::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(145deg, rgba(0, 255, 200, 0.08) 0%, rgba(0, 150, 255, 0.05) 100%);
      pointer-events: none;
    }

    .play-icon-bg {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 18px 0 18px 32px;
      border-color: transparent transparent transparent #ffffff;
      margin-left: 8px;
      filter: drop-shadow(0 0 6px rgba(0, 200, 255, 0.5));
    }

    .video-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #fff 0%, #cfd9e6 90%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6px;
    }

    .video-meta {
      font-size: 14px;
      color: #9aa4b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 4px;
      height: 4px;
      background: #4a5568;
      border-radius: 50%;
    }

    /* 状态区 */
    .status-area {
      margin: 16px 0 10px;
      min-height: 70px;
    }

    .loading-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #b4c0d4;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 15px;
      font-weight: 450;
    }

    /* 失败提示卡 */
    .fail-container {
      display: none;
      background: rgba(220, 38, 38, 0.08);
      border-radius: 20px;
      padding: 16px 18px;
      border: 1px solid rgba(239, 68, 68, 0.25);
      backdrop-filter: blur(4px);
      margin-top: 6px;
    }

    .fail-icon {
      font-size: 28px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .fail-message {
      font-size: 16px;
      font-weight: 500;
      color: #f1f5f9;
      margin-bottom: 10px;
    }

    .jump-link {
      display: inline-block;
      color: #3b9eff;
      font-weight: 600;
      font-size: 18px;
      text-decoration: none;
      border-bottom: 2px solid rgba(59, 158, 255, 0.5);
      padding-bottom: 2px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .jump-link:hover {
      color: #7ab7ff;
      border-bottom-color: #7ab7ff;
    }

    .jump-link:active {
      opacity: 0.7;
    }

    .footnote {
      margin-top: 20px;
      font-size: 13px;
      color: #6b7a90;
      border-top: 1px dashed rgba(255,255,255,0.08);
      padding-top: 18px;
    }

    .pkg-badge {
      background: #1f2a36;
      padding: 6px 12px;
      border-radius: 40px;
      display: inline-block;
      font-size: 12px;
      color: #a0b3cc;
      margin-top: 8px;
      font-family: monospace;
    }

    /* 一键跳转按钮 (备用) 在失败区内已有点击蓝字, 额外加个明显区域 */
    .manual-btn {
      margin-top: 5px;
    }

    /* 隐藏辅助 */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="player-card">
    <!-- 视频风格头部 -->
    <div class="video-thumb">
      <div class="play-icon-bg">
        <div class="play-icon"></div>
      </div>
      <div class="video-title">抖音 · 热门精选</div>
      <div class="video-meta">
        <span>@推荐</span>
        <span class="dot"></span>
        <span>1.2w 播放</span>
        <span class="dot"></span>
        <span>刚刚</span>
      </div>
    </div>

    <!-- 动态状态区：加载 / 失败 -->
    <div class="status-area">
      <!-- 加载中 (默认显示) -->
      <div id="loadingBlock" class="loading-message">
        <div class="spinner"></div>
        <div class="loading-text">正在打开抖音 ···</div>
        <div style="font-size: 13px; opacity: 0.7; margin-top: 4px;">精彩视频 即刻呈现</div>
      </div>

      <!-- 跳转失败区块 (初始隐藏) -->
      <div id="failBlock" class="fail-container">
        <div class="fail-icon">⚠️</div>
        <div class="fail-message">跳转失败，点击蓝字一键跳转</div>
        <div class="manual-btn">
          <span id="manualJumpBtn" class="jump-link" role="button" tabindex="0">🔵 一键跳转</span>
        </div>
        <div class="pkg-badge">
          com.ss.android.ugc.aweme
        </div>
      </div>
    </div>

    <div class="footnote">
      <span>📱 如未安装，请前往应用商店下载抖音</span>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // 包名 (用于展示 / 部分浏览器intent)
      const TARGET_PACKAGE = "com.ss.android.ugc.aweme";
      // 抖音 scheme (同时兼容 Android / iOS)
      const DOUYIN_SCHEME = "snssdk1128://";
      // 备选: 也可以用 douyin:// 但 snssdk1128 最通用
      
      // DOM 元素
      const loadingBlock = document.getElementById('loadingBlock');
      const failBlock = document.getElementById('failBlock');
      const manualJumpBtn = document.getElementById('manualJumpBtn');

      // 状态控制
      let jumpTimer = null;
      let visibilityHandler = null;
      let isJumping = false;         // 防止重复触发
      let failShown = false;

      // 清理计时器与监听器
      function clearJumpTimerAndListener() {
        if (jumpTimer) {
          clearTimeout(jumpTimer);
          jumpTimer = null;
        }
        if (visibilityHandler) {
          document.removeEventListener('visibilitychange', visibilityHandler);
          visibilityHandler = null;
        }
      }

      // 显示失败界面
      function showFailUI() {
        if (failShown) return;
        failShown = true;
        loadingBlock.style.display = 'none';
        failBlock.style.display = 'block';
      }

      // 隐藏失败，显示加载 (用于重试时)
      function showLoadingUI() {
        failShown = false;
        loadingBlock.style.display = 'flex';
        failBlock.style.display = 'none';
      }

      // 核心跳转逻辑：尝试唤起抖音
      function performJump() {
        // 清理之前的计时与监听，避免冲突
        clearJumpTimerAndListener();
        
        // 标记正在跳转
        isJumping = true;
        
        // 记录开始时间（备用）
        const startTime = Date.now();

        // ===== 尝试唤起 App =====
        // 优先使用 scheme 跳转 (最直接)
        // 在绝大多数移动浏览器中可用
        try {
          window.location.href = DOUYIN_SCHEME;
        } catch (e) {
          // 忽略异常，某些浏览器可能不允许直接修改 location
          console.warn("scheme跳转异常:", e);
        }

        // 针对部分浏览器 (如 Chrome) 使用 Intent 语法增强 (同时指定包名)
        // 使用 iframe 方式作为辅助，避免覆盖 location (但 location 已经尝试)
        // 增加一个隐藏 iframe 尝试 intent 方式，提高成功率
        try {
          const intentUrl = `intent://#Intent;scheme=snssdk1128;package=${TARGET_PACKAGE};S.browser_fallback_url=${encodeURIComponent(window.location.href)};end`;
          const iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = intentUrl;
          document.body.appendChild(iframe);
          setTimeout(() => {
            if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
          }, 2000);
        } catch (e) {
          // 忽略
        }

        // 额外尝试：有些旧版 webview 需要 a 标签点击？但我们已经使用 location + iframe，足够。
        
        // 设置超时检测：如果页面没有隐藏，则认为跳转失败
        jumpTimer = setTimeout(function() {
          // 超时后，检查页面可见性，若依然可见，说明很可能没有唤起成功 (或者用户取消了)
          if (!document.hidden) {
            // 跳转失败，显示失败界面
            showFailUI();
            isJumping = false;
          } else {
            // 页面隐藏了，大概率唤起成功，不做失败展示
            // 但有可能用户手动返回，此时页面重新可见；但我们已不再处理。
          }
          clearJumpTimerAndListener(); // 清理自身
          jumpTimer = null;
        }, 2800); // 2.8秒后判断，给足够时间响应

        // 监听页面可见性变化：如果页面隐藏，说明跳转很可能成功 (应用被拉起)
        visibilityHandler = function() {
          if (document.hidden) {
            // 页面隐藏，清除超时定时器，不显示失败
            clearJumpTimerAndListener();
            isJumping = false;
            // 此时可以认为跳转成功，但不需要额外UI变化 (loading继续显示也没关系，因为用户已离开)
            // 为了防止用户返回后看到loading，可以保持loading，但用户返回可能期望看到失败界面？
            // 更合理的：如果用户返回，我们可以让loading继续，但他们可以手动点击重试。
            // 但为了体验，如果用户手动返回，保留loading或显示什么？不做变动即可。
          }
        };
        document.addEventListener('visibilitychange', visibilityHandler);
      }

      // 重置并重新尝试跳转 (用户手动点击“一键跳转”)
      function retryJump() {
        // 清理之前的定时器/监听
        clearJumpTimerAndListener();
        
        // 切换UI到加载状态
        showLoadingUI();
        
        // 重置跳转标志
        isJumping = false;
        
        // 执行跳转
        performJump();
      }

      // 页面初始化：立即尝试跳转
      function autoJumpOnLoad() {
        // 显示加载界面 (默认已显示，但确保)
        showLoadingUI();
        
        // 执行跳转
        performJump();
      }

      // 绑定手动跳转事件 (点击蓝字“一键跳转”)
      manualJumpBtn.addEventListener('click', function(e) {
        e.preventDefault();
        retryJump();
      });

      // 为了更好兼容触摸，添加键盘支持 (可选)
      manualJumpBtn.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          retryJump();
        }
      });

      // 页面加载后自动跳转
      window.addEventListener('load', function() {
        // 微小的延迟，确保DOM完全渲染
        setTimeout(autoJumpOnLoad, 20);
      });

      // 额外处理：如果页面从后台返回（用户手动从App切换回来），但之前可能跳转失败定时器未触发。
      // 但没关系，保留现有状态。如果处于加载状态，用户可以手动点击一键跳转。
      
      // 针对某些浏览器在页面加载时可能阻止非用户手势跳转，我们已经做了尽力尝试。
      // 如果自动跳转被阻止，用户会看到加载界面一直转圈，这时可以手动点击“一键跳转”(用户手势触发)
      // 我们在加载界面没有自动消失，超时后会变成失败界面 (展示蓝字一键跳转)
      
      // 优化：如果用户在超时前就点击了手动按钮？但我们隐藏了失败界面，不过如果用户通过其他方式?
      // 没有暴露手动按钮，只有失败后才显示。但为了防止极端情况，可以添加一个隐藏的手动入口？不用。
      
      // 另外: 在微信内等可能屏蔽 scheme, 超时后会显示失败，点击蓝字依然会尝试，如果还失败可以提示用浏览器打开。
      // 这里加一个小提示已在 footnote 说明。
      
      // 如果页面卸载前清理定时器 (虽然不是必须，但良好实践)
      window.addEventListener('beforeunload', function() {
        clearJumpTimerAndListener();
      });

      // 额外处理：由于自动跳转可能在某些浏览器需要用户交互，我们也可以提供一个极隐蔽的“模拟点击”
      // 但按照规范，我们不做欺骗行为，而是提供清晰的手动按钮。
      // 符合 “显示跳转失败点击蓝字一键跳转” 的要求。
      
    })();
  </script>
  <!-- 增加一个备用的手动唤起方案：如果超时失败，一键跳转非常明显 -->
  <!-- 设计完全符合：一进入就立马跳转，失败显示蓝字一键跳转 -->
</body>
</html>
